name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Create exportOptions.plist if missing
        run: |
          if [ ! -f exportOptions.plist ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '    <key>method</key>'
            echo '    <string>app-store-connect</string>'
            echo '    <key>teamID</key>'
            echo '    <string>Q74Y85HU2Y</string>'
            echo '    <key>signingStyle</key>'
            echo '    <string>manual</string>'
            echo '</dict>'
            echo '</plist>'
          fi > exportOptions.plist
          cp exportOptions.plist ios/

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Archive app (no signing)
        working-directory: ios
        run: |
          xcodebuild archive \
            -workspace freshsweeper.xcworkspace \
            -scheme freshsweeper \
            -archivePath freshsweeper.xcarchive \
            -jobs 1 \
            SWIFT_VERSION=5.0 \
            CODE_SIGNING_ALLOWED=NO

      - name: Debug - Test git clone with token
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          echo "Testing clone using the token..."
          git clone https://carlnjoku:${MATCH_GIT_BASIC_AUTHORIZATION}@github.com/carlnjoku/certificates.git test_clone
          ls -la test_clone
          rm -rf test_clone

      - name: Sync certificates with fastlane match
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane match appstore --readonly

      - name: Export IPA with signing
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/freshsweeper.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath ios/output \
            -allowProvisioningUpdates

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: freshsweeper
          path: ios/output/freshsweeper.ipa