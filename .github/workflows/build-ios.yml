name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: DEBUG - Show root contents and find exportOptions.plist
        run: |
          echo "=== Repository root contents ==="
          ls -la
          echo "=== Searching for exportOptions.plist ==="
          find . -name "exportOptions.plist" -type f
          echo "=== Git status ==="
          git status
          echo "=== Last commit ==="
          git log -1 --oneline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Copy exportOptions.plist from root to ios folder
        run: |
          if [ -f "exportOptions.plist" ]; then
            echo "✅ exportOptions.plist found in root, copying to ios/"
            cp -v exportOptions.plist ios/
          else
            echo "❌ exportOptions.plist NOT found in root"
            echo "Current directory contents:"
            ls -la
            exit 1
          fi

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Archive app
        working-directory: ios
        run: |
          xcodebuild archive \
            -workspace freshsweeper.xcworkspace \
            -scheme freshsweeper \
            -archivePath freshsweeper.xcarchive \
            -jobs 1 \
            SWIFT_VERSION=5.0 \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify exportOptions.plist exists before export
        run: |
          echo "=== Checking ios/exportOptions.plist before export ==="
          ls -la ios/exportOptions.plist || (echo "File missing!" && exit 1)

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/freshsweeper.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath ios/output

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: freshsweeper
          path: ios/output/freshsweeper.ipa