name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Create exportOptions.plist
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '    <key>method</key>' \
            '    <string>app-store-connect</string>' \
            '    <key>teamID</key>' \
            '    <string>Q74Y85HU2Y</string>' \
            '    <key>provisioningProfiles</key>' \
            '    <dict>' \
            '        <key>com.flavoursoft.freshsweeperv5</key>' \
            '        <string>match AppStore com.flavoursoft.freshsweeperv5</string>' \
            '    </dict>' \
            '    <key>signingStyle</key>' \
            '    <string>manual</string>' \
            '</dict>' \
            '</plist>' > exportOptions.plist
          cp exportOptions.plist ios/

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Archive app (no signing)
        working-directory: ios
        run: |
          xcodebuild archive \
            -workspace freshsweeper.xcworkspace \
            -scheme freshsweeper \
            -archivePath freshsweeper.xcarchive \
            -jobs 1 \
            SWIFT_VERSION=5.0 \
            CODE_SIGNING_ALLOWED=NO

      - name: Create temporary keychain
        run: |
          security create-keychain -p "temp123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Clone certificates repository
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          git clone https://carlnjoku:${MATCH_GIT_BASIC_AUTHORIZATION}@github.com/carlnjoku/certificates.git ./certs_repo

      - name: Install certificates and provisioning profile
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_NAME: "build.keychain"
          MATCH_KEYCHAIN_PASSWORD: "temp123"
        run: |
          fastlane match appstore --readonly \
            --git_url ./certs_repo \
            --app_identifier com.flavoursoft.freshsweeperv5 \
            --keychain_name build.keychain \
            --keychain_password temp123

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/freshsweeper.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath ios/output

      - name: Clean up keychains
        if: always()
        run: |
          security delete-keychain build.keychain

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: freshsweeper
          path: ios/output/freshsweeper.ipa